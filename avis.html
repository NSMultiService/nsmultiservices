<body>
  <header class="site-header container header-inner">
    <a class="brand" href="index.html">NSM</a>
    <nav class="nav">
      <a href="index.html">Accueil</a>
      <a href="services.html">Nos services</a>
      <a href="about.html">À propos</a>
      <a href="avis.html" aria-current="page">Avis</a>
      <a href="contact.html" class="btn small">Contact</a>
    </nav>
    <button class="nav-toggle" aria-label="Ouvrir le menu">☰</button>
  </header>

  <main class="container">
    <h1>Avis de nos clients</h1>

    <section class="review-form card">
      <h2>Laisser un avis</h2>
      <form id="reviewForm" action="javascript:void(0);">
        <label>Nom
          <input type="text" name="name" required>
        </label>
        <label>Service (optionnel)
          <select name="service">
            <option value="">-- Aucun --</option>
            <option>Services administratifs</option>
            <option>Impression & bureautique</option>
            <option>Informatique & sécurité</option>
          </select>
        </label>
        <label>Note
          <select name="rating" required>
            <option value="">-- Choisir --</option>
            <option value="5">5 — Excellent</option>
            <option value="4">4 — Très bien</option>
            <option value="3">3 — Bien</option>
            <option value="2">2 — Moyen</option>
            <option value="1">1 — Insatisfait</option>
          </select>
        </label>
        <label>Avis
          <textarea name="message" rows="4" required></textarea>
        </label>
        <div class="form-actions">
          <button type="submit" class="btn primary">Publier</button>
          <a href="https://wa.me/50940317399" class="btn outline" target="_blank" rel="noopener">Envoyer via WhatsApp</a>
        </div>
        <p id="reviewStatus" class="muted"></p>
      </form>
    </section>

    <section class="reviews-list">
      <h2>Avis récents</h2>
      <div id="reviewsList" class="grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
        
      <div>

        <a href="tel:+50947812457">+509 47 81 2457</a>
        <a href="tel:+50941819394">+509 41 81 9394</a>
      </div>
    </div>
  </footer>
  <a class="whatsapp-float" href="https://wa.me/50940317399" target="_blank" rel="noopener">WA</a>
  <script src="assets/js/reviews.js"></script>
</body>
</html>
